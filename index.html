<!DOCTYPE html>
<html lang="en">
  <head> 
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <link rel="stylesheet" href="style.css" type="text/css">
  <body>
    <div class="frame">
      <div class="top">
        <div class="overlay"><img class="eth" src="images/icon-view.svg" alt="alt"></div>
      </div>
      <div class="bottom">
        <p class="head">Equilibrium #3429</p>
        <p class="light">Our Equilnibrium collection promotes balance and calm.</p>
        <div class="wrapper">
          <div class="wrap-one">
            <div class="logo-1"><img class="eth" src="../images/icon-ethereum.svg" alt="alt"></div>
            <div class="i-t-one">0.041 ETH</div>
          </div>
          <div class="wrap-two">
            <div class="logo-2"> <img class="clock" src="../images/icon-clock.svg" alt="alt"></div>
            <div class="i-t-two">3 days left</div>
          </div>
        </div>
        <hr>
      </div>
      <div class="end"><img class="profile" src="../images/image-avatar.png" alt="alt">
        <div class="text-wrap">
          <div class="creation"> Creation of</div>
          <div class="author">Jules Wyvern</div>
        </div>
      </div>
    </div>
  </body>
</html>
